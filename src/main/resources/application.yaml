spring:
  application:
    name: ticketing-platform
  profiles:
    active: local
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

logging:
  pattern:
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:-yyyy-MM-dd'T'HH:mm:ss.SSSXXX}}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} [%X{correlationId}] %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
