spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing_db
    username: ticketing
    password: ticketing
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: ticketing
    password: ticketing
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.ticketing: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

jwt:
  secret: ${JWT_SECRET:ZmFrZS1qc3ctc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2LTAwMDAwMDAwMDA=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

frontend:
  url: ${FRONTEND_URL:https://ticketing-platform.vercel.app}
