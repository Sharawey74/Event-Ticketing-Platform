spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing_db
    username: ticketing
    password: ticketing
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: ticketing
    password: ticketing
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    com.ticketing: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
